<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Berita - Admin</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Admin Style CSS -->
    <link rel="stylesheet" href="../css/admin-style.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- ... sidebar sama seperti index.html ... -->
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-kaaba"></i>
                    <div class="logo-text">
                        <span>YAYASAN AL-HIDAYAH</span>
                        <small>Lembah Hijau</small>
                    </div>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <div class="sidebar-menu">
                <div class="menu-section">
                    <div class="menu-label">MAIN</div>
                    <ul>
                        <li>
                            <a href="../dashboard.html">
                                <i class="fas fa-home"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>
                    </ul>
                </div>
                
                <div class="menu-section">
                    <div class="menu-label">KONTEN</div>
                    <ul>
                        <li>
                            <a href="../contact/index.html">
                                <i class="fas fa-address-book"></i>
                                <span>Contact</span>
                            </a>
                        </li>
                        <li>
                            <a href="../contact-message/index.html">
                                <i class="fas fa-envelope"></i>
                                <span>Pesan Masuk</span>
                                <span class="menu-badge">3</span>
                            </a>
                        </li>
                        <li>
                            <a href="../donation/index.html">
                                <i class="fas fa-hand-holding-heart"></i>
                                <span>Donasi</span>
                            </a>
                        </li>
                        <li class="active">
                            <a href="index.html">
                                <i class="fas fa-newspaper"></i>
                                <span>Berita</span>
                            </a>
                        </li>
                        <li>
                            <a href="../gallery/index.html">
                                <i class="fas fa-images"></i>
                                <span>Galeri</span>
                            </a>
                        </li>
                    </ul>
                </div>
                
                <div class="menu-section">
                    <div class="menu-label">AKUN</div>
                    <ul>
                        <li>
                            <a href="#">
                                <i class="fas fa-user-cog"></i>
                                <span>Profile</span>
                            </a>
                        </li>
                        <li>
                            <a href="../login.html">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>Logout</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="admin-info">
                    <div class="admin-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="admin-detail">
                        <span class="admin-name">Admin</span>
                        <span class="admin-role">Administrator</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navigation -->
            <nav class="top-nav">
                <div class="page-title">
                    <h2>Edit Berita</h2>
                </div>
                
                <div class="top-nav-actions">
                    <div class="notification-dropdown">
                        <button class="notification-btn">
                            <i class="fas fa-bell"></i>
                            <span class="notification-badge">3</span>
                        </button>
                    </div>
                    
                    <div class="admin-dropdown">
                        <button class="admin-btn">
                            <i class="fas fa-user-circle"></i>
                            <span>Admin</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                </div>
            </nav>
            
            <!-- Content Area -->
            <div class="content-area">
                <div class="form-container">
                    <form action="index.html" method="get" class="admin-form">
                        <div class="form-grid">
                            <!-- Judul -->
                            <div class="form-group full-width">
                                <label for="judul">Judul Berita *</label>
                                <input 
                                    type="text" 
                                    id="judul" 
                                    name="judul" 
                                    value="Wisuda Angkatan ke-26"
                                    required
                                >
                            </div>
                            
                            <!-- Slug -->
                            <div class="form-group">
                                <label for="slug">Slug (URL)</label>
                                <input 
                                    type="text" 
                                    id="slug" 
                                    name="slug" 
                                    value="wisuda-angkatan-ke-26"
                                >
                            </div>
                            
                            <!-- Kategori -->
                            <div class="form-group">
                                <label for="kategori">Kategori *</label>
                                <select id="kategori" name="kategori" required>
                                    <option value="Pendidikan" selected>Pendidikan</option>
                                    <option value="Kemanusiaan">Kemanusiaan</option>
                                    <option value="Prestasi">Prestasi</option>
                                    <option value="Kegiatan">Kegiatan</option>
                                </select>
                            </div>
                            
                            <!-- Status -->
                            <div class="form-group">
                                <label for="status">Status *</label>
                                <select id="status" name="status" required>
                                    <option value="published" selected>Published</option>
                                    <option value="draft">Draft</option>
                                </select>
                            </div>
                            
                            <!-- Tanggal -->
                            <div class="form-group">
                                <label for="tanggal">Tanggal *</label>
                                <input 
                                    type="date" 
                                    id="tanggal" 
                                    name="tanggal" 
                                    value="2024-06-15"
                                    required
                                >
                            </div>
                            
                            <!-- Penulis -->
                            <div class="form-group">
                                <label for="penulis">Penulis</label>
                                <input 
                                    type="text" 
                                    id="penulis" 
                                    name="penulis" 
                                    value="Admin"
                                >
                            </div>
                            
                            <!-- Current Photo -->
                            <div class="form-group full-width">
                                <label>Foto Saat Ini</label>
                                <div class="current-photo">
                                    <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=300" alt="Current">
                                </div>
                            </div>
                            
                            <!-- Ganti Foto -->
                            <div class="form-group full-width">
                                <label for="foto">Ganti Foto</label>
                                <input 
                                    type="file" 
                                    id="foto" 
                                    name="foto" 
                                    accept="image/*"
                                >
                                <small>Kosongkan jika tidak ingin mengganti foto</small>
                            </div>
                            
                            <!-- Ringkasan -->
                            <div class="form-group full-width">
                                <label for="ringkasan">Ringkasan</label>
                                <textarea 
                                    id="ringkasan" 
                                    name="ringkasan" 
                                    rows="3"
                                >98% Lulusan Diterima di PTN Favorit. Sebanyak 312 siswa SMA Islam Al-Hidayah diwisuda dengan prestasi gemilang.</textarea>
                            </div>
                            
                            <!-- Konten -->
                            <div class="form-group full-width">
                                <label for="konten">Konten Berita *</label>
                                <textarea 
                                    id="konten" 
                                    name="konten" 
                                    rows="15"
                                    required
                                >Jakarta, 15 Juni 2024 - Yayasan Al-Hidayah Lembah Hijau menggelar wisuda angkatan ke-26 yang berlangsung meriah di Balai Sidang Jakarta Convention Center. Sebanyak 312 siswa SMA Islam Al-Hidayah diwisuda dengan prestasi gemilang, dan 306 di antaranya (98%) diterima di berbagai perguruan tinggi negeri (PTN) favorit di Indonesia...</textarea>
                            </div>
                            
                            <!-- Tags -->
                            <div class="form-group full-width">
                                <label for="tags">Tags</label>
                                <input 
                                    type="text" 
                                    id="tags" 
                                    name="tags" 
                                    value="wisuda, prestasi, pendidikan"
                                >
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn-save">
                                <i class="fas fa-save"></i> Update Berita
                            </button>
                            <a href="index.html" class="btn-cancel">
                                <i class="fas fa-times"></i> Batal
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // Sidebar Toggle
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        
        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.toggle('collapsed');
        });
        
        // Auto generate slug
        document.getElementById('judul').addEventListener('keyup', function() {
            const judul = this.value;
            const slug = judul.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/[\s_-]+/g, '-')
                .replace(/^-+|-+$/g, '');
            
            document.getElementById('slug').value = slug;
        });
        
        // Form submit demo
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Berita berhasil diperbarui!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
