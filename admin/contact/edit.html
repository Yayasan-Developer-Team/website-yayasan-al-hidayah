<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Kontak - Admin</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Admin Style CSS -->
    <link rel="stylesheet" href="../css/admin-style.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- ... sidebar sama seperti index.html ... -->
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-kaaba"></i>
                    <div class="logo-text">
                        <span>YAYASAN AL-HIDAYAH</span>
                        <small>Lembah Hijau</small>
                    </div>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <div class="sidebar-menu">
                <div class="menu-section">
                    <div class="menu-label">MAIN</div>
                    <ul>
                        <li>
                            <a href="../dashboard.html">
                                <i class="fas fa-home"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>
                    </ul>
                </div>
                
                <div class="menu-section">
                    <div class="menu-label">KONTEN</div>
                    <ul>
                        <li class="active">
                            <a href="index.html">
                                <i class="fas fa-address-book"></i>
                                <span>Contact</span>
                            </a>
                        </li>
                        <li>
                            <a href="../cantact-message/index.html">
                                <i class="fas fa-envelope"></i>
                                <span>Pesan Masuk</span>
                                <span class="menu-badge">3</span>
                            </a>
                        </li>
                        <li>
                            <a href="../donation/index.html">
                                <i class="fas fa-hand-holding-heart"></i>
                                <span>Donasi</span>
                            </a>
                        </li>
                        <li>
                            <a href="../news/index.html">
                                <i class="fas fa-newspaper"></i>
                                <span>Berita</span>
                            </a>
                        </li>
                        <li>
                            <a href="../gallery/index.html">
                                <i class="fas fa-images"></i>
                                <span>Galeri</span>
                            </a>
                        </li>
                    </ul>
                </div>
                
                <div class="menu-section">
                    <div class="menu-label">AKUN</div>
                    <ul>
                        <li>
                            <a href="#">
                                <i class="fas fa-user-cog"></i>
                                <span>Profile</span>
                            </a>
                        </li>
                        <li>
                            <a href="../login.html">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>Logout</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="admin-info">
                    <div class="admin-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="admin-detail">
                        <span class="admin-name">Admin</span>
                        <span class="admin-role">Administrator</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navigation -->
            <nav class="top-nav">
                <div class="page-title">
                    <h2>Edit Informasi Kontak</h2>
                </div>
                
                <div class="top-nav-actions">
                    <div class="notification-dropdown">
                        <button class="notification-btn">
                            <i class="fas fa-bell"></i>
                            <span class="notification-badge">3</span>
                        </button>
                    </div>
                    
                    <div class="admin-dropdown">
                        <button class="admin-btn">
                            <i class="fas fa-user-circle"></i>
                            <span>Admin</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                </div>
            </nav>
            
            <!-- Content Area -->
            <div class="content-area">
                <div class="form-container">
                    <form action="index.html" method="get" class="admin-form">
                        <div class="form-grid">
                            <!-- Alamat -->
                            <div class="form-group full-width">
                                <label for="alamat">Alamat Lengkap *</label>
                                <textarea 
                                    id="alamat" 
                                    name="alamat" 
                                    rows="3" 
                                    required
                                >Jl. Pendidikan No. 123, Cilandak, Jakarta Selatan 12540</textarea>
                            </div>
                            
                            <!-- Telepon -->
                            <div class="form-group">
                                <label for="telepon">Telepon *</label>
                                <input 
                                    type="text" 
                                    id="telepon" 
                                    name="telepon" 
                                    value="(021) 1234-5678"
                                    required
                                >
                            </div>
                            
                            <!-- WhatsApp -->
                            <div class="form-group">
                                <label for="whatsapp">WhatsApp *</label>
                                <input 
                                    type="text" 
                                    id="whatsapp" 
                                    name="whatsapp" 
                                    value="0812-1234-5678"
                                    required
                                >
                            </div>
                            
                            <!-- Email -->
                            <div class="form-group">
                                <label for="email">Email *</label>
                                <input 
                                    type="email" 
                                    id="email" 
                                    name="email" 
                                    value="info@alhidayah.or.id"
                                    required
                                >
                            </div>
                            
                            <!-- Email Cadangan -->
                            <div class="form-group">
                                <label for="email_cadangan">Email Cadangan</label>
                                <input 
                                    type="email" 
                                    id="email_cadangan" 
                                    name="email_cadangan" 
                                    value="pendaftaran@alhidayah.or.id"
                                >
                            </div>
                            
                            <!-- Jam Operasional -->
                            <div class="form-group full-width">
                                <label for="jam_operasional">Jam Operasional *</label>
                                <textarea 
                                    id="jam_operasional" 
                                    name="jam_operasional" 
                                    rows="3" 
                                    required
                                >Senin - Jumat: 07.30 - 16.00
Sabtu: 08.00 - 14.00
Minggu: Tutup</textarea>
                            </div>
                            
                            <!-- Google Maps -->
                            <div class="form-group full-width">
                                <label for="google_maps">Link Google Maps</label>
                                <input 
                                    type="url" 
                                    id="google_maps" 
                                    name="google_maps" 
                                    value="https://maps.google.com/?q=..."
                                >
                            </div>
                            
                            <!-- Sosial Media -->
                            <div class="form-group">
                                <label for="instagram">Instagram</label>
                                <input 
                                    type="text" 
                                    id="instagram" 
                                    name="instagram" 
                                    value="@alhidayah.lembahhijau"
                                >
                            </div>
                            
                            <div class="form-group">
                                <label for="facebook">Facebook</label>
                                <input 
                                    type="text" 
                                    id="facebook" 
                                    name="facebook" 
                                    value="yayasan.alhidayah"
                                >
                            </div>
                            
                            <div class="form-group">
                                <label for="youtube">Youtube</label>
                                <input 
                                    type="text" 
                                    id="youtube" 
                                    name="youtube" 
                                    value="@alhidayahtv"
                                >
                            </div>
                            
                            <div class="form-group">
                                <label for="tiktok">TikTok</label>
                                <input 
                                    type="text" 
                                    id="tiktok" 
                                    name="tiktok" 
                                    value="@alhidayah.official"
                                >
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn-save">
                                <i class="fas fa-save"></i> Simpan Perubahan
                            </button>
                            <a href="index.html" class="btn-cancel">
                                <i class="fas fa-times"></i> Batal
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // Sidebar Toggle
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        
        sidebarToggle.addEventListener('click', function() {
            sidebar.classList.toggle('collapsed');
        });
        
        // Form submit demo
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Data berhasil disimpan!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
